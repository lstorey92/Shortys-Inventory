services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shortys-app
    env_file:
      - .env.aws
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/shortys_inventory?schema=public
    ports:
      - "80:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: shortys-db
    environment:
      POSTGRES_DB: shortys_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - shortys_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shortys_inventory"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

volumes:
  shortys_pgdata:
